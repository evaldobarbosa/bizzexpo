services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: bizzexpo-api
    working_dir: /var/www/html
    volumes:
      - ./api:/var/www/html
      - ./api/vendor:/var/www/html/vendor
    ports:
      - "8095:8080"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=bizzexpo
      - DB_USERNAME=bizzexpo
      - DB_PASSWORD=bizzexpo
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - MAIL_MAILER=smtp
      - MAIL_HOST=mailpit
      - MAIL_PORT=1025
      - MAIL_USERNAME=null
      - MAIL_PASSWORD=null
      - MAIL_ENCRYPTION=null
      - MAIL_FROM_ADDRESS=noreply@bizzexpo.com.br
      - MAIL_FROM_NAME=Duevento
      - AWS_ACCESS_KEY_ID=rustfsadmin
      - AWS_SECRET_ACCESS_KEY=rustfsadmin
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_BUCKET=bizzexpo
      - AWS_URL=http://rustfs:9000/bizzexpo
      - AWS_ENDPOINT=http://rustfs:9000
      - AWS_USE_PATH_STYLE_ENDPOINT=true
      - FILESYSTEM_DISK=s3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - bizzexpo-network
    command: php artisan serve --host=0.0.0.0 --port=8080

  queue:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: bizzexpo-queue
    working_dir: /var/www/html
    volumes:
      - ./api:/var/www/html
      - ./api/vendor:/var/www/html/vendor
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=bizzexpo
      - DB_USERNAME=bizzexpo
      - DB_PASSWORD=bizzexpo
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis
      - MAIL_MAILER=smtp
      - MAIL_HOST=mailpit
      - MAIL_PORT=1025
      - MAIL_USERNAME=null
      - MAIL_PASSWORD=null
      - MAIL_ENCRYPTION=null
      - MAIL_FROM_ADDRESS=noreply@bizzexpo.com.br
      - MAIL_FROM_NAME=Duevento
      - AWS_ACCESS_KEY_ID=rustfsadmin
      - AWS_SECRET_ACCESS_KEY=rustfsadmin
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_BUCKET=bizzexpo
      - AWS_URL=http://rustfs:9000/bizzexpo
      - AWS_ENDPOINT=http://rustfs:9000
      - AWS_USE_PATH_STYLE_ENDPOINT=true
      - FILESYSTEM_DISK=s3
    depends_on:
      - api
      - mailpit
    networks:
      - bizzexpo-network
    command: php artisan queue:work --tries=3 --timeout=90

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: bizzexpo-scheduler
    working_dir: /var/www/html
    volumes:
      - ./api:/var/www/html
      - ./api/vendor:/var/www/html/vendor
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=bizzexpo
      - DB_USERNAME=bizzexpo
      - DB_PASSWORD=bizzexpo
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AWS_ACCESS_KEY_ID=rustfsadmin
      - AWS_SECRET_ACCESS_KEY=rustfsadmin
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_BUCKET=bizzexpo
      - AWS_URL=http://rustfs:9000/bizzexpo
      - AWS_ENDPOINT=http://rustfs:9000
      - AWS_USE_PATH_STYLE_ENDPOINT=true
      - FILESYSTEM_DISK=s3
    depends_on:
      - api
    networks:
      - bizzexpo-network
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"

  front:
    image: node:22-alpine
    container_name: bizzexpo-front
    working_dir: /app
    volumes:
      - ./front:/app
      - front_node_modules:/app/node_modules
    ports:
      - "5190:5173"
    environment:
      - NODE_ENV=development
    networks:
      - bizzexpo-network
    command: sh -c "corepack enable && corepack prepare pnpm@latest --activate && pnpm install && pnpm dev --host"

  postgres:
    image: postgres:16-alpine
    container_name: bizzexpo-postgres
    environment:
      POSTGRES_DB: bizzexpo
      POSTGRES_USER: bizzexpo
      POSTGRES_PASSWORD: bizzexpo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bizzexpo -d bizzexpo"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bizzexpo-network

  redis:
    image: redis:7-alpine
    container_name: bizzexpo-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bizzexpo-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: bizzexpo-mailpit
    ports:
      - "8025:8025"  # UI Web
      - "1025:1025"  # SMTP
    networks:
      - bizzexpo-network
      - proxymng

  rustfs:
    image: rustfs/rustfs:latest
    container_name: bizzexpo-rustfs
    user: "10001:10001"
    volumes:
      - rustfs_data:/data
      - rustfs_logs:/logs
    networks:
      - bizzexpo-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  bizzexpo-network:
    driver: bridge
  proxymng:
    external: true

volumes:
  postgres_data:
  redis_data:
  front_node_modules:
  rustfs_data:
  rustfs_logs:
