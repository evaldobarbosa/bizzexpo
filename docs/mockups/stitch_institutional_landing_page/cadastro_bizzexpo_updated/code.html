<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up | BizzExpo</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#0048ad",
              "accent-yellow": "#ffb800",
              "accent-red": "#e63946",
              "background-light": "#f5f7f8",
              "background-dark": "#0f1723",
            },
            fontFamily: {
              "display": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="flex min-h-screen flex-col items-center justify-center p-4 sm:p-8">
<!-- Logo / Branding Accent -->
<div class="mb-8 flex items-center gap-2">
<div class="flex gap-1">
<div class="h-8 w-2 bg-primary rounded-full"></div>
<div class="h-8 w-2 bg-accent-yellow rounded-full"></div>
<div class="h-8 w-2 bg-accent-red rounded-full"></div>
</div>
<span class="text-2xl font-bold tracking-tight text-primary">BizzExpo</span>
</div>
<div class="w-full max-w-md bg-white dark:bg-slate-800/50 rounded-xl shadow-xl border border-slate-200 dark:border-slate-700 overflow-hidden">
<!-- Header -->
<div class="p-6 pb-0">
<h1 class="text-2xl font-bold leading-tight mb-2">Create your account</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm">Join the BizzExpo network and grow your business.</p>
</div>
<form class="p-6 space-y-4">
<!-- Full Name -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">person</span>
<input class="w-full pl-10 pr-4 py-2.5 bg-background-light dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">mail</span>
<input class="w-full pl-10 pr-4 py-2.5 bg-background-light dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" placeholder="john@example.com" type="email"/>
</div>
</div>
<!-- Password Row -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">lock</span>
<input class="w-full pl-10 pr-10 py-2.5 bg-background-light dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px] cursor-pointer">visibility</span>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium">Confirm</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">shield</span>
<input class="w-full pl-10 pr-4 py-2.5 bg-background-light dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- Terms -->
<div class="flex items-start gap-3 py-2">
<input class="mt-1 h-4 w-4 rounded border-slate-300 text-primary focus:ring-primary cursor-pointer" id="terms" type="checkbox"/>
<label class="text-sm text-slate-600 dark:text-slate-400 leading-snug cursor-pointer" for="terms">
                        I agree to the <a class="text-primary hover:underline font-medium" href="#">Terms of Service</a> and <a class="text-primary hover:underline font-medium" href="#">Privacy Policy</a>.
                    </label>
</div>
<!-- Sign Up Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-3 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2" type="submit">
                    Create Account
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
<!-- Divider -->
<div class="relative my-6">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-700"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-white dark:bg-slate-800 px-2 text-slate-500">Or continue with</span>
</div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 px-4 py-2.5 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-all" type="button">
<img alt="" class="w-5 h-5" data-alt="Google colorful logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCaSrXhuIiqjh4xIk4yyy5VCs35Pmg_M0aDSUDTZnO3kEl1nAmBTdKlQTsdbIvk25J-owFvIB0Z1a8h7dW6Ik0-SQE1qTibu_i5vEz37ktcuK6fmGpgi6CT62P4_H6Hdo85VNziekSo_jit4Qaf-VpKT1NIEwLWE-7Lh-OCv1d0-9FzHl6klvQd6T6VlWZE_Z7uYiUR99by7Gu0JhWs4YLwUliTY0rGr8RWqCmd7xIWxJ1d_4LcXNaIQlA4yidDCyfG8Gf6XrO5i10"/>
<span class="text-sm font-medium">Google</span>
</button>
<button class="flex items-center justify-center gap-2 px-4 py-2.5 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-all" type="button">
<svg class="w-5 h-5 text-[#0077B5]" fill="currentColor" viewbox="0 0 24 24">
<path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"></path>
</svg>
<span class="text-sm font-medium">LinkedIn</span>
</button>
</div>
</form>
<!-- Footer Link -->
<div class="p-6 bg-slate-50 dark:bg-slate-900/50 text-center border-t border-slate-200 dark:border-slate-700">
<p class="text-sm text-slate-600 dark:text-slate-400">
                    Already have an account? 
                    <a class="text-primary font-bold hover:underline" href="#">Log in</a>
</p>
</div>
</div>
<!-- Floating Decorative Accents -->
</div>
</body></html>
