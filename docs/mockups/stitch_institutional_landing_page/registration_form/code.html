<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Inscrição Tech Summit 2026</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0048ad",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1723",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto bg-background-light dark:bg-background-dark shadow-xl overflow-x-hidden">
<!-- Header -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-10">
<button class="text-slate-900 dark:text-slate-100 flex size-10 items-center justify-center hover:bg-slate-200 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 ml-2">BizzExpo Event</h2>
</div>
<div class="flex flex-col flex-1 px-4 py-6">
<!-- Hero Title -->
<h1 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight mb-6">Inscreva-se no evento Tech Summit 2026</h1>
<!-- Form -->
<form class="space-y-4">
<div class="flex flex-col gap-1.5">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Nome completo</label>
<input class="form-input flex w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary h-12 px-4 text-base" placeholder="Digite seu nome completo" type="text"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Email</label>
<input class="form-input flex w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary h-12 px-4 text-base" placeholder="seu@email.com" type="email"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-1.5">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Telefone</label>
<input class="form-input flex w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary h-12 px-4 text-base" placeholder="(00) 00000-0000" type="tel"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Cidade/UF</label>
<input class="form-input flex w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary h-12 px-4 text-base" placeholder="Ex: São Paulo/SP" type="text"/>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Empresa</label>
<input class="form-input flex w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary h-12 px-4 text-base" placeholder="Nome da sua empresa" type="text"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Cargo</label>
<input class="form-input flex w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary h-12 px-4 text-base" placeholder="Seu cargo atual" type="text"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Categoria</label>
<div class="relative">
<select class="form-select flex w-full appearance-none rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary h-12 px-4 pr-10 text-base">
<option value="">Selecione uma categoria</option>
<option value="estudante">Estudante</option>
<option value="profissional">Profissional</option>
<option value="expositor">Expositor</option>
<option value="imprensa">Imprensa</option>
</select>
</div>
</div>
<!-- Checkbox Terms -->
<label class="flex items-start gap-3 mt-6 cursor-pointer">
<input class="form-checkbox mt-1 size-5 rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary" type="checkbox"/>
<span class="text-sm text-slate-600 dark:text-slate-400">Concordo com os termos de privacidade e condições do evento Tech Summit 2026.</span>
</label>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] mt-4" type="submit">
                    Confirmar inscrição
                </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-300 dark:border-slate-700"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="bg-background-light dark:bg-background-dark px-2 text-slate-500">Ou entre com</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 py-3 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<img alt="Google Logo" class="size-5" data-alt="Google colorful icon logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD188oh5HBXFDyh3FbVfwCLs77vxC5UM_t9PjgYo7hGXYqO0W6jcyvqVluyc1qPJg_-wFggw4I3e0ItjwGcYF5-RZZqhhCrPi7ezJNZJHQkfu1W8YDkha0NXcDbL8CxTvMyKxN35FU9ATCDiVKfmMpb53z-Qa2BlbQf7k6O3LSHexMxSXUvVfhkdrWvd7BG2wCjyU_9QA-Hfbqvf6ah9VzRp1hKAsLFBTVESi513dONYh3sVk86Ug9XYB6p4Cmo5mdzJfAr3ywoZvw"/>
<span class="text-sm font-medium">Google</span>
</button>
<button class="flex items-center justify-center gap-2 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 py-3 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<svg class="size-5 text-[#0077b5]" fill="currentColor" viewbox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"></path></svg>
<span class="text-sm font-medium">LinkedIn</span>
</button>
</div>
<!-- Footer Link -->
<div class="text-center mt-8 pb-10">
<p class="text-slate-600 dark:text-slate-400">
                    Já tem conta? 
                    <a class="text-primary font-bold hover:underline" href="#">Entrar</a>
</p>
</div>
</div>
<!-- Bottom Navigation (Mobile Style) -->
<nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex justify-around items-center py-2 px-6">
<a class="flex flex-col items-center gap-0.5 text-primary" href="#">
<span class="material-symbols-outlined fill-1">home</span>
<span class="text-[10px] font-medium">Início</span>
</a>
<a class="flex flex-col items-center gap-0.5 text-slate-500" href="#">
<span class="material-symbols-outlined">calendar_today</span>
<span class="text-[10px] font-medium">Eventos</span>
</a>
<a class="flex flex-col items-center gap-0.5 text-slate-500" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium">Perfil</span>
</a>
</nav>
</div>
</body></html>
